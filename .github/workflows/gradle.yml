name: Java CI with Gradle

on: [push, pull_request]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Set up JDK 11
        uses: actions/setup-java@v2
        with:
          java-version: '11'
          distribution: 'adopt'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Start SUT
        # Запускаем целевой сервис (SUT) в фоновом режиме
        # Имя файла SUT: app-card-delivery.jar
        run: java -jar ./artifacts/app-card-delivery.jar &
      - name: Run tests
        # Запускаем автотесты с флагом -Dselenide.headless=true
        # Параметр --info также остается
        run: ./gradlew test --info -Dselenide.headless=true
